<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>离线树洞工作台</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%239c2f24'/%3E%3Ctext x='32' y='41' font-size='30' text-anchor='middle' fill='white' font-family='Arial, sans-serif'%3E%E6%B4%9E%3C/text%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="./styles.css?v=organizer-4" />
  </head>
  <body>
    <svg class="icon-sprite" aria-hidden="true">
      <symbol id="icon-search" viewBox="0 0 24 24">
        <path d="m21 21-4.34-4.34" />
        <circle cx="11" cy="11" r="7" />
      </symbol>
      <symbol id="icon-filter" viewBox="0 0 24 24">
        <path d="M4 5h16M7 12h10M10 19h4" />
      </symbol>
      <symbol id="icon-star" viewBox="0 0 24 24">
        <path d="m12 3 2.72 5.52 6.09.89-4.4 4.29 1.04 6.06L12 16.9l-5.45 2.86 1.04-6.06-4.4-4.29 6.09-.89L12 3Z" />
      </symbol>
      <symbol id="icon-chat" viewBox="0 0 24 24">
        <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7A8.38 8.38 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.5 8.5 0 0 1 21 11.5Z" />
      </symbol>
      <symbol id="icon-pin" viewBox="0 0 24 24">
        <path d="m15 4 5 5-4 1-4 7-2-2-5 5 5-5-2-2 7-4 1-5Z" />
      </symbol>
      <symbol id="icon-copy" viewBox="0 0 24 24">
        <rect x="9" y="9" width="11" height="11" rx="2" />
        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
      </symbol>
      <symbol id="icon-send" viewBox="0 0 24 24">
        <path d="m22 2-7 20-4-9-9-4 20-7Z" />
        <path d="M22 2 11 13" />
      </symbol>
      <symbol id="icon-database" viewBox="0 0 24 24">
        <ellipse cx="12" cy="5" rx="8" ry="3" />
        <path d="M4 5v6c0 1.66 3.58 3 8 3s8-1.34 8-3V5" />
        <path d="M4 11v6c0 1.66 3.58 3 8 3s8-1.34 8-3v-6" />
      </symbol>
      <symbol id="icon-loader" viewBox="0 0 24 24">
        <path d="M21 12a9 9 0 1 1-6.22-8.56" />
      </symbol>
      <symbol id="icon-import" viewBox="0 0 24 24">
        <path d="M12 3v12" />
        <path d="m7 10 5 5 5-5" />
        <path d="M5 17v4h14v-4" />
      </symbol>
      <symbol id="icon-calendar" viewBox="0 0 24 24">
        <path d="M8 2v4M16 2v4M3 10h18" />
        <rect x="3" y="5" width="18" height="16" rx="2" />
      </symbol>
      <symbol id="icon-folder" viewBox="0 0 24 24">
        <path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2Z" />
      </symbol>
      <symbol id="icon-plus" viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14" />
      </symbol>
      <symbol id="icon-edit" viewBox="0 0 24 24">
        <path d="M12 20h9" />
        <path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z" />
      </symbol>
      <symbol id="icon-wand" viewBox="0 0 24 24">
        <path d="M15 4V2M15 10v-2M10 5H8M22 5h-2M19 8l-1.4-1.4M12.4 6.6 11 8" />
        <path d="m5 21 12-12 2 2L7 23Z" />
      </symbol>
      <symbol id="icon-check" viewBox="0 0 24 24">
        <path d="m20 6-11 11-5-5" />
      </symbol>
    </svg>

    <div class="app-shell">
      <section class="workspace" aria-label="帖子工作区">
        <header class="topbar">
          <div class="brand-block">
            <div class="brand-seal" aria-hidden="true">洞</div>
            <div>
              <h1>离线树洞</h1>
              <p id="indexSummary">本地索引</p>
            </div>
          </div>
          <label class="search-box">
            <svg class="icon"><use href="#icon-search"></use></svg>
            <input id="searchInput" type="search" placeholder="搜索帖子、评论、PID" autocomplete="off" />
          </label>
          <div class="topbar-actions">
            <div class="status-pill">
              <svg class="icon"><use href="#icon-database"></use></svg>
              <span id="workbenchStatus">本地缓存</span>
            </div>
            <button class="icon-button import-button" id="pidImportButton" title="从文段提取 PID 并抓取" aria-label="导入 PID">
              <svg class="icon"><use href="#icon-import"></use></svg>
              <span>导入 PID</span>
            </button>
            <button class="icon-button" id="reindexButton" title="重建索引" aria-label="重建索引">
              <svg class="icon"><use href="#icon-loader"></use></svg>
            </button>
          </div>
        </header>

        <div class="search-band">
          <div class="filter-row" aria-label="帖子筛选条件">
            <label class="date-filter">
              <svg class="icon"><use href="#icon-calendar"></use></svg>
              <select id="datePresetSelect" aria-label="日期范围">
                <option value="">全部日期</option>
                <option value="today">今天</option>
                <option value="7d">近 7 天</option>
                <option value="30d">近 30 天</option>
                <option value="90d">近 90 天</option>
                <option value="6m">近 6 个月</option>
                <option value="custom">自定义</option>
              </select>
            </label>
            <div class="date-custom" id="dateCustomControls" hidden>
              <input id="startDateInput" type="date" aria-label="开始日期" />
              <span>至</span>
              <input id="endDateInput" type="date" aria-label="结束日期" />
            </div>
            <div class="collection-filter">
              <svg class="icon"><use href="#icon-folder"></use></svg>
              <select id="collectionFilterSelect" aria-label="收藏栏">
                <option value="">全部帖子</option>
              </select>
              <button class="inline-icon-button" id="newCollectionButton" type="button" title="新建收藏栏" aria-label="新建收藏栏">
                <svg class="icon"><use href="#icon-plus"></use></svg>
              </button>
              <button class="inline-icon-button" id="generateTitlesButton" type="button" title="为当前收藏栏补标题" aria-label="为当前收藏栏补标题">
                <svg class="icon"><use href="#icon-wand"></use></svg>
              </button>
            </div>
            <div class="threshold-filters">
              <label class="number-filter">
                <span>收藏 ≥</span>
                <input id="minStarInput" type="number" min="0" step="1" inputmode="numeric" placeholder="0" />
              </label>
              <label class="number-filter">
                <span>评论 ≥</span>
                <input id="minReplyInput" type="number" min="0" step="1" inputmode="numeric" placeholder="0" />
              </label>
            </div>
            <label class="sort-box">
              <svg class="icon"><use href="#icon-filter"></use></svg>
              <select id="sortSelect" aria-label="排序">
                <option value="recent">最近发布</option>
                <option value="star">收藏优先</option>
                <option value="reply">回复优先</option>
              </select>
            </label>
          </div>
        </div>

        <div class="content-grid" id="contentGrid">
          <aside class="feed-pane" aria-label="帖子列表">
            <div class="section-head">
              <h2>洞流</h2>
              <span id="resultCount">0</span>
            </div>
            <section class="calendar-panel" aria-label="日期缓存日历">
              <div class="calendar-head">
                <button class="mini-icon-button" id="calendarPrevButton" type="button" title="上个月" aria-label="上个月">‹</button>
                <div>
                  <strong id="calendarTitle">日历</strong>
                  <span id="calendarTodayLabel">今天</span>
                </div>
                <button class="mini-icon-button" id="calendarNextButton" type="button" title="下个月" aria-label="下个月">›</button>
              </div>
              <div class="calendar-weekdays" aria-hidden="true">
                <span>一</span>
                <span>二</span>
                <span>三</span>
                <span>四</span>
                <span>五</span>
                <span>六</span>
                <span>日</span>
              </div>
              <div class="calendar-grid" id="calendarGrid"></div>
            </section>
            <div class="post-list" id="postList"></div>
            <div class="feed-pager" aria-label="帖子翻页">
              <button id="prevPageButton" type="button">上一页</button>
              <span id="pageInfo">0 / 0</span>
              <button id="nextPageButton" type="button">下一页</button>
              <button id="loadMoreButton" type="button">加载更多</button>
            </div>
          </aside>

          <div
            class="column-resizer column-resizer-inner"
            data-resizer="feed"
            role="separator"
            aria-label="调整左栏宽度"
            aria-orientation="vertical"
            tabindex="0"
          ></div>

          <main class="detail-pane" id="detailPane" aria-live="polite"></main>
        </div>
      </section>

      <div
        class="column-resizer column-resizer-outer"
        data-resizer="assistant"
        role="separator"
        aria-label="调整右栏宽度"
        aria-orientation="vertical"
        tabindex="0"
      ></div>

      <aside class="assistant-panel" aria-label="LLM 侧边栏">
        <header class="assistant-head">
          <div>
            <h2 id="modelLabel">LLM</h2>
            <p id="sessionLabel">agent.py CLI</p>
          </div>
        </header>

        <div class="chat-log" id="chatLog" aria-live="polite"></div>

        <form class="composer" id="chatForm">
          <textarea id="chatInput" rows="2" placeholder="输入 agent.py 命令或问题" aria-label="聊天输入"></textarea>
          <button class="send-button" type="submit" title="发送" aria-label="发送">
            <svg class="icon"><use href="#icon-send"></use></svg>
          </button>
        </form>
      </aside>
    </div>

    <div class="modal-backdrop" id="pidImportModal" hidden>
      <section class="pid-import-dialog" role="dialog" aria-modal="true" aria-labelledby="pidImportTitle">
        <header class="dialog-head">
          <div>
            <h2 id="pidImportTitle">提取并抓取 PID</h2>
            <p id="pidImportSubtitle">写入本地帖子和评论缓存</p>
          </div>
          <button class="icon-button" id="pidImportCloseButton" type="button" title="关闭" aria-label="关闭">×</button>
        </header>

        <form class="pid-import-form" id="pidImportForm">
          <div class="pid-import-body">
            <textarea
              id="pidImportText"
              rows="8"
              placeholder="粘贴包含 PID 的文段"
              aria-label="包含 PID 的文段"
            ></textarea>
            <div class="pid-import-preview">
              <div class="pid-import-preview-head">
                <span id="pidImportCount">0 个 PID</span>
                <span>自动去重</span>
              </div>
              <div class="pid-import-chips" id="pidImportChips"></div>
            </div>
            <div class="pid-import-result" id="pidImportResult" aria-live="polite"></div>
          </div>
          <footer class="dialog-actions">
            <button type="button" id="pidImportCancelButton">取消</button>
            <button class="primary-action" type="submit" id="pidImportSubmitButton" disabled>提取并抓取</button>
          </footer>
        </form>
      </section>
    </div>

    <script src="./app.js?v=organizer-5"></script>
  </body>
</html>
